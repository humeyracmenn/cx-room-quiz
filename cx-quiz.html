<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CX Room Quiz</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  padding:1rem 1rem 2rem;
  background:#0047CC;
  background-image:
    radial-gradient(ellipse at 15% 15%, #1a6fff 0%, transparent 55%),
    radial-gradient(ellipse at 85% 85%, #002899 0%, transparent 55%);
}
.app{width:100%;max-width:420px}
.screen{display:none}
.screen.active{display:block}

.card{background:rgba(255,255,255,0.13);backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.22);border-radius:16px;padding:1.25rem;margin-bottom:1rem}

h1,h2,h3,p{color:#fff}
p{font-size:14px;color:rgba(255,255,255,0.8);line-height:1.6}

.btn{width:100%;padding:11px;border-radius:10px;border:1px solid rgba(255,255,255,0.28);
background:rgba(255,255,255,0.1);color:#fff;cursor:pointer;margin-bottom:8px}

.btn:hover{background:rgba(255,255,255,0.22)}
.btn.primary{background:#fff;color:#0047CC;font-weight:700}
.btn.correct{background:rgba(74,222,128,0.25)}
.btn.wrong{background:rgba(248,113,113,0.25)}

.progress-bar{height:5px;background:rgba(255,255,255,0.2);border-radius:3px;margin-bottom:1rem}
.progress-fill{height:100%;background:#fff}

.timer-num{text-align:center;font-size:42px;color:#fff;font-weight:700}

.badge{font-size:12px;padding:3px 10px;background:rgba(255,255,255,0.2);border-radius:6px}

</style>
</head>

<body>
<div class="app">

<!-- INTRO -->
<div class="screen active" id="intro">
  <div class="card">
    <h1>CX Room Quiz</h1>
    <p>Müşteri odaklılık bilginizi test edin.</p>

    <div style="margin-top:10px">
      <span class="badge">10 Soru</span>
      <span class="badge">20 sn</span>
      <span class="badge">Zaman Bonus</span>
    </div>

    <button class="btn primary" onclick="startGame()">Başla</button>
  </div>
</div>

<!-- GAME -->
<div class="screen" id="game">

  <div class="card">
    <div class="progress-bar">
      <div class="progress-fill" id="progress"></div>
    </div>

    <div class="timer-num" id="timer">20</div>

    <h3 id="question"></h3>
    <div id="options"></div>

    <div id="feedback"></div>
    <button class="btn primary" id="nextBtn" onclick="next()" style="display:none">Sonraki</button>
  </div>

</div>

<!-- RESULT -->
<div class="screen" id="result">
  <div class="card">
    <h2 id="resultTitle"></h2>
    <p id="resultText"></p>

    <p>Skor: <span id="score"></span></p>
    <p>Doğru: <span id="correct"></span></p>

    <button class="btn primary" onclick="location.reload()">Tekrar Oyna</button>
  </div>
</div>

</div>

<script>
const QUESTIONS=[
 {q:"Müşteri odaklılık nedir?",opts:["Kolay olanı yapmak","Müşteriyi önceliklendirmek","Sadece şirket hedefi","İşten kaçınmak"],a:1},
 {q:"Memnuniyetsiz müşteri?",opts:["Görmezden gel","Anlamaya çalış","Kapat","Reddet"],a:1},
 {q:"Güven nasıl oluşur?",opts:["Yalan","Şeffaflık","Kaçınma","Sessizlik"],a:1},
 {q:"Empati nedir?",opts:["Ezber cevap","Duyguyu anlamak","Hızlı konuşma","Kural"],a:1},
 {q:"Sahiplenme?",opts:["Devretmek","Takip etmek","Bırakmak","Kaçmak"],a:1},
 {q:"Geri bildirim?",opts:["Önemli değil","Sadece olumlu","Sürekli gelişim","Yok say"],a:2},
 {q:"Doğru iletişim?",opts:["Suçlama","Çözüm odaklı","Kaba dil","Sessizlik"],a:1},
 {q:"Karar alma?",opts:["Kişisel rahatlık","Müşteri etkisi","Hız","Şans"],a:1},
 {q:"Güven kaynağı?",opts:["Tutarsızlık","Netlik","Gizleme","Hata"],a:1},
 {q:"Müşteri yaklaşımı?",opts:["Standart cevap","Yardımcı olmak","Reddetmek","İlgisiz"],a:1}
];

let i=0,score=0,correct=0,time=20,timer;

function startGame(){
  show("game");
  load();
}

function load(){
  let q=QUESTIONS[i];
  document.getElementById("question").innerText=q.q;

  document.getElementById("options").innerHTML=
    q.opts.map((o,idx)=>
      `<button class="btn" onclick="answer(${idx})">${o}</button>`
    ).join("");

  document.getElementById("feedback").innerHTML="";
  document.getElementById("nextBtn").style.display="none";

  document.getElementById("progress").style.width=(i/QUESTIONS.length)*100+"%";

  time=20;
  document.getElementById("timer").innerText=time;

  clearInterval(timer);
  timer=setInterval(()=>{
    time--;
    document.getElementById("timer").innerText=time;
    if(time<=0){
      clearInterval(timer);
      reveal(false);
    }
  },1000);
}

function answer(a){
  clearInterval(timer);
  let q=QUESTIONS[i];
  let btns=document.querySelectorAll(".btn");

  if(a===q.a){
    score+=100;
    correct++;
    btns[a].classList.add("correct");
    reveal(true);
  }else{
    btns[a].classList.add("wrong");
    btns[q.a].classList.add("correct");
    reveal(false);
  }
}

function reveal(ok){
  document.getElementById("feedback").innerHTML=
    ok?"✔ Doğru!":"✖ Yanlış!";
  document.getElementById("nextBtn").style.display="block";
}

function next(){
  i++;
  if(i>=QUESTIONS.length){
    end();
  }else{
    load();
  }
}

function end(){
  show("result");
  document.getElementById("score").innerText=score;
  document.getElementById("correct").innerText=correct+"/10";

  if(correct>=8){
    document.getElementById("resultTitle").innerText="Mükemmel!";
  }else if(correct>=5){
    document.getElementById("resultTitle").innerText="İyi!";
  }else{
    document.getElementById("resultTitle").innerText="Gelişmeli";
  }

  document.getElementById("resultText").innerText="CX bilgini tamamladın.";
}

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
